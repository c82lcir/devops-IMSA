- hosts: all
  become: yes
  tasks:
  - name: creer repertoire
    file:
      path: /app_data
      state: directory
  - name: Créer le groupe app_group
    ansible.builtin.group:
      name: app_group
      state: present
  - name: Créer l'utilisateur app_user avec répertoire home
    ansible.builtin.user:
      name: app_user
      state: present
      home: /home/app_user
      groups: app_group
      append: yes  # Ajoute l'utilisateur au groupe
  - name: Définir app_user comme propriétaire du répertoire /app_data
    ansible.builtin.file:
      path: /app_data
      owner: app_user
      group: app_group
      mode: "0744"
      recurse: yes
                                                          